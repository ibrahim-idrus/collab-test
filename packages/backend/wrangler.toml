name = "collab-test-backend"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
FRONTEND_URL = "http://localhost:5173"

# NeonDB connection string - set via wrangler secret
# Run: wrangler secret put DATABASE_URL
# DATABASE_URL = "postgresql://user:password@host/dbname?sslmode=require"

# PostHog API key - set via wrangler secret
# Run: wrangler secret put POSTHOG_API_KEY

# R2 Object Storage bucket
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "collab-test-storage"
preview_bucket_name = "collab-test-storage-preview"

# Cloudflare Queue for background tasks
[[queues.producers]]
binding = "TASK_QUEUE"
queue = "collab-test-tasks"

[[queues.consumers]]
queue = "collab-test-tasks"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[dev]
port = 8787
local_protocol = "http"
